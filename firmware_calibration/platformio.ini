; SX1280 Ranging Calibration Firmware — LILYGO T3-S3 V1.3
; Usage:
;   Flash master board:  pio run -e master -t upload
;   Flash slave board:   pio run -e slave  -t upload
;   Monitor master:      pio device monitor

[env]
platform      = espressif32
board         = esp32-s3-devkitc-1
framework     = arduino
lib_deps      = jgromes/RadioLib @ ^7.0.0
monitor_speed = 115200
upload_speed  = 921600
build_flags   =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

[env:master]
build_flags =
    ${env.build_flags}
    -DCAL_MASTER

[env:slave]
; no extra flag — default branch is slave
